{% extends 'gestio/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mt-5">
            <div class="card-header border-0 bg-white pb-0">
                <h3 class="card-title fw-bold text-primary mb-0">Verificació de Correu</h3>
            </div>
            <div class="card-body pt-3">
                <p>Hem enviat un codi de verificació de 6 dígits al teu correu electrònic.</p>
                <form method="post">
                    {% csrf_token %}
                    
                    {{ form.non_field_errors }}
                    <div class="mb-3">
                        <label for="{{ form.code.id_for_label }}" class="form-label text-muted fw-semibold">{{ form.code.label }}</label>
                        {{ form.code }}
                        {{ form.code.errors }}
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-sm">Verificar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
